# site settings
title: David Plehn
subtitle: Software · AI/ML
email: dplehn@uci.edu
description: CS (Intelligent Systems) + Quantitative Economics @ UC Irvine — building AI/ML systems and full-stack software.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://Plehndm.github.io" # the base hostname & protocol for your site
author: David Plehn
city: Irvine
state: CA
country: United States

# homepage tiles
tiles-source: posts # accepts "posts" or "pages"
tiles-count: 12

# social settings (key must match the name of a Font Awesome brand icon)
# Icons are not shown if the value is empty
socials:
  GitHub: https://github.com/Plehndm
  LinkedIn: https://www.linkedin.com/in/david-plehn
  Instagram: https://www.instagram.com/dplehn_314

# build settings
markdown: kramdown
permalink: /projects/:title/
future: true # build posts whose dates are in the future (project tile ordering uses future dates)

# Project detail pages (posts) use the NET ("neurons") animated background
defaults:
  - scope:
      path: ""
      type: posts
    values:
      bg-effect: net

sass:
  style: compressed

exclude:
- "*.gemspec"
- LICENSE.md
- README.md
- CLAUDE.md
- Gemfile
- Gemfile.lock
- vendor
