<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'IBM Plex Mono', Consolas, monospace">
  <rect width="800" height="500" fill="#0d1225"/>

  <!-- header -->
  <text x="60" y="58" fill="#6ee7ff" font-size="17" font-weight="600">GPT&#160;FROM&#160;SCRATCH</text>
  <text x="60" y="82" fill="#6a7694" font-size="12">// transformer internals, built by hand</text>

  <!-- causal attention heatmap (lower triangle = visible, upper = masked) -->
  <text x="60" y="122" fill="#93a0c0" font-size="11">causal self-attention · softmax(QK^T / &#8730;d) · V</text>
  <g>
    <rect x="60"  y="136" width="30" height="30" fill="#6ee7ff" opacity="0.85"/>
    <rect x="94"  y="136" width="30" height="30" fill="#131a30"/>
    <rect x="128" y="136" width="30" height="30" fill="#131a30"/>
    <rect x="162" y="136" width="30" height="30" fill="#131a30"/>
    <rect x="196" y="136" width="30" height="30" fill="#131a30"/>
    <rect x="230" y="136" width="30" height="30" fill="#131a30"/>

    <rect x="60"  y="170" width="30" height="30" fill="#6ee7ff" opacity="0.35"/>
    <rect x="94"  y="170" width="30" height="30" fill="#6ee7ff" opacity="0.7"/>
    <rect x="128" y="170" width="30" height="30" fill="#131a30"/>
    <rect x="162" y="170" width="30" height="30" fill="#131a30"/>
    <rect x="196" y="170" width="30" height="30" fill="#131a30"/>
    <rect x="230" y="170" width="30" height="30" fill="#131a30"/>

    <rect x="60"  y="204" width="30" height="30" fill="#6ee7ff" opacity="0.15"/>
    <rect x="94"  y="204" width="30" height="30" fill="#6ee7ff" opacity="0.5"/>
    <rect x="128" y="204" width="30" height="30" fill="#6ee7ff" opacity="0.75"/>
    <rect x="162" y="204" width="30" height="30" fill="#131a30"/>
    <rect x="196" y="204" width="30" height="30" fill="#131a30"/>
    <rect x="230" y="204" width="30" height="30" fill="#131a30"/>

    <rect x="60"  y="238" width="30" height="30" fill="#6ee7ff" opacity="0.25"/>
    <rect x="94"  y="238" width="30" height="30" fill="#6ee7ff" opacity="0.15"/>
    <rect x="128" y="238" width="30" height="30" fill="#6ee7ff" opacity="0.45"/>
    <rect x="162" y="238" width="30" height="30" fill="#6ee7ff" opacity="0.8"/>
    <rect x="196" y="238" width="30" height="30" fill="#131a30"/>
    <rect x="230" y="238" width="30" height="30" fill="#131a30"/>

    <rect x="60"  y="272" width="30" height="30" fill="#6ee7ff" opacity="0.1"/>
    <rect x="94"  y="272" width="30" height="30" fill="#6ee7ff" opacity="0.3"/>
    <rect x="128" y="272" width="30" height="30" fill="#6ee7ff" opacity="0.2"/>
    <rect x="162" y="272" width="30" height="30" fill="#6ee7ff" opacity="0.55"/>
    <rect x="196" y="272" width="30" height="30" fill="#6ee7ff" opacity="0.85"/>
    <rect x="230" y="272" width="30" height="30" fill="#131a30"/>

    <rect x="60"  y="306" width="30" height="30" fill="#6ee7ff" opacity="0.2"/>
    <rect x="94"  y="306" width="30" height="30" fill="#6ee7ff" opacity="0.1"/>
    <rect x="128" y="306" width="30" height="30" fill="#6ee7ff" opacity="0.35"/>
    <rect x="162" y="306" width="30" height="30" fill="#6ee7ff" opacity="0.25"/>
    <rect x="196" y="306" width="30" height="30" fill="#6ee7ff" opacity="0.5"/>
    <rect x="230" y="306" width="30" height="30" fill="#6ee7ff" opacity="0.9"/>
  </g>
  <text x="290" y="155" fill="#6a7694" font-size="11">&#9633; = masked</text>
  <text x="290" y="173" fill="#6a7694" font-size="11">future tokens</text>

  <!-- architecture stack -->
  <g font-size="12" text-anchor="middle">
    <rect x="480" y="118" width="220" height="40" rx="6" fill="#131a30" stroke="#35456e"/>
    <text x="590" y="143" fill="#93a0c0">token + positional embed</text>

    <rect x="480" y="176" width="220" height="40" rx="6" fill="#131a30" stroke="#6ee7ff"/>
    <text x="590" y="201" fill="#6ee7ff">multi-head attention</text>

    <rect x="480" y="234" width="220" height="40" rx="6" fill="#131a30" stroke="#a99be8"/>
    <text x="590" y="259" fill="#a99be8">feed-forward + norm</text>

    <rect x="480" y="292" width="220" height="40" rx="6" fill="#131a30" stroke="#35456e"/>
    <text x="590" y="317" fill="#93a0c0">logits &#8594; next token</text>
  </g>
  <g stroke="#35456e" stroke-width="1.6">
    <line x1="590" y1="158" x2="590" y2="176"/>
    <line x1="590" y1="216" x2="590" y2="234"/>
    <line x1="590" y1="274" x2="590" y2="292"/>
  </g>
  <text x="716" y="232" fill="#6a7694" font-size="11">&#215;N</text>
  <path d="M712 196 C 740 196, 740 259, 712 259" fill="none" stroke="#6a7694" stroke-width="1.2"/>

  <!-- token stream: previous tokens attend into the predicted one -->
  <g font-size="12" text-anchor="middle">
    <rect x="60"  y="396" width="110" height="34" rx="5" fill="#131a30" stroke="#35456e"/><text x="115" y="418" fill="#93a0c0">attention</text>
    <rect x="180" y="396" width="70"  height="34" rx="5" fill="#131a30" stroke="#35456e"/><text x="215" y="418" fill="#93a0c0">is</text>
    <rect x="260" y="396" width="70"  height="34" rx="5" fill="#131a30" stroke="#35456e"/><text x="295" y="418" fill="#93a0c0">all</text>
    <rect x="340" y="396" width="70"  height="34" rx="5" fill="#131a30" stroke="#35456e"/><text x="375" y="418" fill="#93a0c0">you</text>
    <rect x="420" y="396" width="96"  height="34" rx="5" fill="#0d1225" stroke="#6ee7ff" stroke-dasharray="4 3"/><text x="468" y="418" fill="#6ee7ff">need?</text>
  </g>
  <!-- attention arcs into the predicted token -->
  <g fill="none" stroke="#6ee7ff">
    <path d="M115 396 C 200 322, 380 322, 462 396" stroke-width="2.4" opacity="0.7"/>
    <path d="M215 396 C 280 340, 400 340, 465 396" stroke-width="1.2" opacity="0.3"/>
    <path d="M295 396 C 340 352, 420 352, 466 396" stroke-width="1.6" opacity="0.45"/>
    <path d="M375 396 C 405 366, 440 366, 467 396" stroke-width="2"   opacity="0.6"/>
  </g>
  <text x="60" y="462" fill="#6a7694" font-size="11">BPE tokenizer · next-token prediction · PyTorch DDP on NVIDIA GPUs</text>
</svg>
