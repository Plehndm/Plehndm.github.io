<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  {% assign page_title = page.title | default: site.title %}
  {% if page.url == "/" %}
  <title>{{ site.title }} — {{ site.subtitle }}</title>
  {% else %}
  <title>{{ page_title }} | {{ site.title }}</title>
  {% endif %}
  {% assign page_desc = page.description | default: site.description %}
  <meta name="description" content="{{ page_desc }}" />
  <meta name="author" content="{{ site.author }}" />
  <meta name="theme-color" content="#0b0f1e" />
  <link rel="canonical" href="{{ page.url | absolute_url }}" />

  <!-- Open Graph / Twitter card -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="{{ site.title }}" />
  <meta property="og:title" content="{% if page.url == '/' %}{{ site.title }} — {{ site.subtitle }}{% else %}{{ page_title }} | {{ site.title }}{% endif %}" />
  <meta property="og:description" content="{{ page_desc }}" />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />
  <meta property="og:image" content="{{ page.image | default: site.og_image | absolute_url }}" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{% if page.url == '/' %}{{ site.title }} — {{ site.subtitle }}{% else %}{{ page_title }} | {{ site.title }}{% endif %}" />
  <meta name="twitter:description" content="{{ page_desc }}" />
  <meta name="twitter:image" content="{{ page.image | default: site.og_image | absolute_url }}" />

  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
</head>
